name: lint
on: push
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: node --version && npx oxlint --version && npx eslint --version

      - name: "1. set-state-in-render (expect: error)"
        run: pnpm lint src/set-state-in-render.tsx
        continue-on-error: true

      - name: "2. effect — no deps (expect: error)"
        run: pnpm lint src/effect-no-deps.tsx
        continue-on-error: true

      - name: "3. effect — empty deps [] (expect: error)"
        run: pnpm lint src/effect-empty-deps.tsx
        continue-on-error: true

      - name: "4. effect — deps, simple setX(value) (expect: error)"
        run: pnpm lint src/effect-with-deps-simple.tsx
        continue-on-error: true

      - name: "5. effect — deps, if/else branches (expect: error)"
        run: pnpm lint src/effect-with-deps-conditional.tsx
        continue-on-error: true

      - name: "6. effect — deps, if only (expect: error)"
        run: pnpm lint src/effect-with-deps-if-only.tsx
        continue-on-error: true

      - name: "7. effect — deps, multi-statement (expect: error)"
        run: pnpm lint src/effect-with-deps-multi-statement.tsx
        continue-on-error: true

      - name: "8. effect — deps, comment before setState (expect: error)"
        run: pnpm lint src/effect-with-deps-comment.tsx
        continue-on-error: true

      - name: "debug A. capture printed oxlint case to file"
        run: |
          set +e
          pnpm lint src/effect-no-deps.tsx > /tmp/oxlint-no-deps.log 2>&1
          status=$?
          echo "exit=$status bytes=$(wc -c < /tmp/oxlint-no-deps.log) lines=$(wc -l < /tmp/oxlint-no-deps.log)"
          sed -n '1,200p' /tmp/oxlint-no-deps.log

      - name: "debug B. capture missing oxlint case to file"
        run: |
          set +e
          pnpm lint src/effect-with-deps-conditional.tsx > /tmp/oxlint-conditional.log 2>&1
          status=$?
          echo "exit=$status bytes=$(wc -c < /tmp/oxlint-conditional.log) lines=$(wc -l < /tmp/oxlint-conditional.log)"
          sed -n '1,200p' /tmp/oxlint-conditional.log

      - name: "debug C. missing oxlint case with unix formatter"
        run: |
          set +e
          npx oxlint --format=unix --type-aware --type-check src/effect-with-deps-conditional.tsx
          echo "exit=$?"

      - name: Summary
        run: echo "All steps should fail. Any step that passes is a missed violation."

      - name: "9. eslint set-state-in-render (expect: error)"
        run: pnpm lint:eslint src/set-state-in-render.tsx --format=stylish
        continue-on-error: true

      - name: "10. eslint effect — no deps (expect: error)"
        run: pnpm lint:eslint src/effect-no-deps.tsx --format=stylish
        continue-on-error: true

      - name: "11. eslint effect — empty deps [] (expect: error)"
        run: pnpm lint:eslint src/effect-empty-deps.tsx --format=stylish
        continue-on-error: true

      - name: "12. eslint effect — deps, simple setX(value) (expect: pass)"
        run: pnpm lint:eslint src/effect-with-deps-simple.tsx --format=stylish
        continue-on-error: true

      - name: "13. eslint effect — deps, if/else branches (expect: error)"
        run: pnpm lint:eslint src/effect-with-deps-conditional.tsx --format=stylish
        continue-on-error: true

      - name: "14. eslint effect — deps, if only (expect: error)"
        run: pnpm lint:eslint src/effect-with-deps-if-only.tsx --format=stylish
        continue-on-error: true

      - name: "15. eslint effect — deps, multi-statement (expect: error)"
        run: pnpm lint:eslint src/effect-with-deps-multi-statement.tsx --format=stylish
        continue-on-error: true

      - name: "16. eslint effect — deps, comment before setState (expect: pass)"
        run: pnpm lint:eslint src/effect-with-deps-comment.tsx --format=stylish
        continue-on-error: true

      - name: ESLint Summary
        run: echo "ESLint should fail for cases 9, 10, 11, 13, 14, and 15, and pass for cases 12 and 16."
