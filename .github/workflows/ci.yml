name: lint
on: push
jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      OXLINT_CLI: vendor/oxc/apps/oxlint/dist/cli.js
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
      - run: pnpm install
      - name: Apply local oxc patches
        run: git -C vendor/oxc apply ../../patches/oxc-github-debug.patch
      - name: Build patched oxlint
        run: |
          npx pnpm@10.30.2 install --dir vendor/oxc --frozen-lockfile
          npx pnpm@10.30.2 --dir vendor/oxc/apps/oxlint run build-dev
      - run: node --version && node "$OXLINT_CLI" --version && npx eslint --version

      - name: "1. set-state-in-render (expect: error)"
        run: |
          mkdir -p logs/oxlint
          set +e
          set -o pipefail
          node "$OXLINT_CLI" --format=github --type-aware --type-check src/set-state-in-render.tsx 2>&1 | tee logs/oxlint/01-set-state-in-render.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: "2. effect — no deps (expect: error)"
        run: |
          mkdir -p logs/oxlint
          set +e
          set -o pipefail
          node "$OXLINT_CLI" --format=github --type-aware --type-check src/effect-no-deps.tsx 2>&1 | tee logs/oxlint/02-effect-no-deps.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: "3. effect — empty deps [] (expect: error)"
        run: |
          mkdir -p logs/oxlint
          set +e
          set -o pipefail
          node "$OXLINT_CLI" --format=github --type-aware --type-check src/effect-empty-deps.tsx 2>&1 | tee logs/oxlint/03-effect-empty-deps.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: "4. effect — deps, simple setX(value) (expect: error)"
        run: |
          mkdir -p logs/oxlint
          set +e
          set -o pipefail
          node "$OXLINT_CLI" --format=github --type-aware --type-check src/effect-with-deps-simple.tsx 2>&1 | tee logs/oxlint/04-effect-with-deps-simple.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: "5. effect — deps, if/else branches (expect: error)"
        run: |
          mkdir -p logs/oxlint
          set +e
          set -o pipefail
          node "$OXLINT_CLI" --format=github --type-aware --type-check src/effect-with-deps-conditional.tsx 2>&1 | tee logs/oxlint/05-effect-with-deps-conditional.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: "6. effect — deps, if only (expect: error)"
        run: |
          mkdir -p logs/oxlint
          set +e
          set -o pipefail
          node "$OXLINT_CLI" --format=github --type-aware --type-check src/effect-with-deps-if-only.tsx 2>&1 | tee logs/oxlint/06-effect-with-deps-if-only.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: "7. effect — deps, multi-statement (expect: error)"
        run: |
          mkdir -p logs/oxlint
          set +e
          set -o pipefail
          node "$OXLINT_CLI" --format=github --type-aware --type-check src/effect-with-deps-multi-statement.tsx 2>&1 | tee logs/oxlint/07-effect-with-deps-multi-statement.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: "8. effect — deps, comment before setState (expect: error)"
        run: |
          mkdir -p logs/oxlint
          set +e
          set -o pipefail
          node "$OXLINT_CLI" --format=github --type-aware --type-check src/effect-with-deps-comment.tsx 2>&1 | tee logs/oxlint/08-effect-with-deps-comment.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Upload oxlint logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oxlint-logs
          path: logs/oxlint

      - name: Summary
        run: echo "All steps should fail. Any step that passes is a missed violation."

      - name: "9. eslint set-state-in-render (expect: error)"
        run: pnpm lint:eslint src/set-state-in-render.tsx --format=stylish
        continue-on-error: true

      - name: "10. eslint effect — no deps (expect: error)"
        run: pnpm lint:eslint src/effect-no-deps.tsx --format=stylish
        continue-on-error: true

      - name: "11. eslint effect — empty deps [] (expect: error)"
        run: pnpm lint:eslint src/effect-empty-deps.tsx --format=stylish
        continue-on-error: true

      - name: "12. eslint effect — deps, simple setX(value) (expect: pass)"
        run: pnpm lint:eslint src/effect-with-deps-simple.tsx --format=stylish
        continue-on-error: true

      - name: "13. eslint effect — deps, if/else branches (expect: error)"
        run: pnpm lint:eslint src/effect-with-deps-conditional.tsx --format=stylish
        continue-on-error: true

      - name: "14. eslint effect — deps, if only (expect: error)"
        run: pnpm lint:eslint src/effect-with-deps-if-only.tsx --format=stylish
        continue-on-error: true

      - name: "15. eslint effect — deps, multi-statement (expect: error)"
        run: pnpm lint:eslint src/effect-with-deps-multi-statement.tsx --format=stylish
        continue-on-error: true

      - name: "16. eslint effect — deps, comment before setState (expect: pass)"
        run: pnpm lint:eslint src/effect-with-deps-comment.tsx --format=stylish
        continue-on-error: true

      - name: ESLint Summary
        run: echo "ESLint should fail for cases 9, 10, 11, 13, 14, and 15, and pass for cases 12 and 16."
